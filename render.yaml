services:
  - type: web
    name: anyaudio-app
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    region: ohio
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
